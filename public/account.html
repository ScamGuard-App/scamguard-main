<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Account - Scamguard</title>
</head>
<body>
    <div id="stars" aria-hidden="true"></div>
    <div id="stars2" aria-hidden="true"></div>
    <div id="stars3" aria-hidden="true"></div>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-code"></i>
        </div>
        <div class="links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="reports.html" class="nav-link">Search</a>
            <a href="learn.html" class="nav-link">Learn</a>
            <a href="report.html" class="nav-link">Submit Report</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-toggle">
            <button id="showSignUp" class="active">Sign&nbsp;Up</button>
            <button id="showLogin">Log&nbsp;In</button>
        </div>

        <form id="signUpForm" class="auth-form">
            <div id="signUpMsg" class="auth-message"></div>
            <div id="signUpError" class="auth-error"></div>
            <div class="form-group">
                <label for="signupUsername">Username <span class="required">*</span></label>
                <input type="text" id="signupUsername" required>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email <span class="required">*</span></label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password <span class="required">*</span></label>
                <input type="password" id="signupPassword" required>
            </div>
            <div class="button-group">
                <button type="submit" id="signupBtn" class="btn btn-submit">Create Account</button>
            </div>
        </form>

        <form id="loginForm" class="auth-form hidden">
            <div id="loginMsg" class="auth-message"></div>
            <div id="loginError" class="auth-error"></div>
            <div class="form-group">
                <label for="loginEmail">Email <span class="required">*</span></label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password <span class="required">*</span></label>
                <input type="password" id="loginPassword" required>
            </div>
            <div class="button-group">
                <button type="submit" id="loginBtn" class="btn btn-submit">Log In</button>
            </div>
        </form>

        <!-- profile management for logged‑in users -->
        <div id="profileSection" class="auth-form hidden">
            <h2>Your Account</h2>
            <div id="profileMsg" class="auth-message"></div>
            <div id="profileError" class="auth-error"></div>
            <div class="form-group">
                <label>Avatar</label>
                <p style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 8px;">Upload a square avatar (PNG/JPG). It will be stored in the `avatars` bucket.</p>
                <div class="file-upload-area" id="avatarArea" onclick="document.getElementById('profileAvatar').click();" style="display:flex; align-items:center; gap:12px;">
                    <div style="width:84px; height:84px; border-radius:50%; overflow:hidden; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center;">
                        <img id="avatarPreview" src="" alt="Avatar preview" class="avatar-preview hidden" style="width:84px; height:84px; object-fit:cover; display:block;">
                        <div id="avatarPlaceholder" style="color:#9ca3af; font-size:24px;"><i class="fas fa-user-circle"></i></div>
                    </div>
                    <div style="flex:1;">
                        <div class="upload-text" style="color:#e5e7eb;">Click to upload or drag and drop</div>
                        <input type="file" id="profileAvatar" accept="image/*,.png,.jpg,.jpeg" style="display:none">
                        <div style="margin-top:8px; display:flex; gap:8px;">
                            <button id="removeAvatarBtn" class="btn btn-reset" type="button">Remove Avatar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="profileUsername">Username</label>
                <input type="text" id="profileUsername">
            </div>
            <div class="form-group">
                <label for="profileEmail">Email</label>
                <input type="email" id="profileEmail">
            </div>
            <div class="form-group">
                <label for="profilePassword">New Password</label>
                <input type="password" id="profilePassword" placeholder="Leave blank to keep existing">
            </div>
            <div class="button-group">
                <button id="updateProfileBtn" class="btn btn-submit">Update Details</button>
                <button id="deleteAccountBtn" class="btn btn-reset">Delete Account</button>
            </div>
            <div class="button-group" style="margin-top:1rem;">
                <button id="adminPortalBtn" class="btn btn-submit hidden">Admin Portal</button>
            </div>
        </div>
        <!-- user's own reports -->
        <div id="userReportsSection" class="auth-form hidden" style="margin-top:2rem;">
            <h2>Your Reports</h2>
            <div id="userReportsContainer" class="scam-grid" style="margin-top:1rem;">
                <p style="grid-column:1/-1; text-align:center; color:#9ca3af;">Loading your reports...</p>
            </div>
        </div>
    </main>

    <script src="js/starfield.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
