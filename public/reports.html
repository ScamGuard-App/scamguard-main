<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Reports - Scamguard</title>
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-code"></i>
        </div>
        <div class="links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="reports.html" class="active nav-link">Search</a>
            <a href="learn.html" class="nav-link">Learn</a>
            <a href="report.html" class="nav-link">Submit Report</a>
        </div>
    </nav>

    <main class="report-container">
        <h1>View All Reports</h1>
        <p>Search and explore reported scams to stay informed</p>

        <!-- Search & Filter Section -->
        <div class="search-section" style="display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 12px; margin-bottom: 30px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="typeFilter">Scam Type</label>
                <select id="typeFilter">
                    <option value="">-- All Types --</option>
                    <option value="phishing">Phishing Scam</option>
                    <option value="tech-support">Tech Support Fraud</option>
                    <option value="romance">Romance Scam</option>
                    <option value="lottery">Lottery & Prize Scam</option>
                    <option value="identity-theft">Identity Theft</option>
                    <option value="cryptocurrency">Cryptocurrency Scam</option>
                    <option value="job-offer">Job Offer Scam</option>
                    <option value="fake-website">Fake Website & Impersonation</option>
                    <option value="social-media">Social Media Scam</option>
                    <option value="auction">Auction & Marketplace Fraud</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="searchInput">Search (fuzzy)</label>
                <input type="text" id="searchInput" placeholder="Company, phone, title...">
            </div>
            <button id="searchBtn" class="btn btn-submit" style="align-self: flex-end; height: 44px;">
                <i class="fas fa-search"></i> Search
            </button>
            <button id="refreshBtn" class="btn btn-reset" style="align-self: flex-end; height: 44px;">
                <i class="fas fa-sync-alt"></i> Reset
            </button>
        </div>

        <!-- Results Table -->
        <div id="resultsContainer" style="overflow-x: auto;">
            <table id="resultsTable" class="reports-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Scam Type</th>
                        <th>Scammer Name</th>
                        <th>Reported By</th>
                        <th>Date</th>
                        <th>Evidence</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 20px; color: #9ca3af;">Loading reports...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Report Detail Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-section">
                    <div class="modal-title">
                        <span class="type-badge" id="modalType"></span>
                        <h2 id="modalTitle"></h2>
                    </div>
                </div>
                <button class="close-modal" onclick="closeReportModal()">✕</button>
            </div>

            <div class="modal-field">
                <label>Scammer Name / Company</label>
                <div class="modal-field-value" id="modalScammerName"></div>
            </div>

            <div class="modal-field">
                <label>Description</label>
                <div class="modal-field-value" id="modalDescription"></div>
            </div>

            <div class="modal-field">
                <label>Reporter Info</label>
                <div class="modal-field-value">
                    <strong id="modalReporter"></strong> • <span id="modalDate"></span>
                    <div style="margin-top: 6px; font-size: 13px; color: #9ca3af;" id="modalPhone"></div>
                </div>
            </div>

            <div class="evidence-section" id="evidenceSection" style="display: none;">
                <label>Evidence Files</label>
                <div class="evidence-list" id="evidenceList"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/reports.js"></script>
</body>
</html>
