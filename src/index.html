<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Scamguard</title>
</head>
<body>
    
    <nav>
        <div class="logo">
            <i class="fas fa-exclamation-circle" style="color: #c41c3b;"></i>
        </div>
        <div class="links">
            <a href="index.html" class="active nav-link">Home</a>
            <a href="reports.html" class="nav-link">Search</a>
            <a href="learn.html" class="nav-link">Learn</a>
            <a href="report.html" class="nav-link">Submit Report</a>
        </div>
    </nav>

    <main class="content">
        <section class="grid">
            <div class="card">
                <h3>Total Reports</h3>
                <p class="stat">Loading...</p>
            </div>
            <div class="card">
                <h3>Top Scam Type</h3>
                <p class="stat">Loading...</p>
            </div>
            <div class="card" style="grid-column: 1 / -1;">
                <h3>Scam Types Breakdown</h3>
                <canvas id="typeChart" style="width:100%;max-height:300px;"></canvas>
            </div>
        </section>

        <section class="recent-scams">
            <h2>Recently Reported Scams <button id="searchRedirect" class="btn" style="margin-left:1rem; font-size:0.8rem;">Search</button></h2>
            <div class="scam-grid">
                <p style="grid-column: 1/-1; text-align: center; color: #9ca3af;">Loading reports...</p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/homepage.js"></script>
    <script type="module" src="js/nav.js"></script>
</body>
</html>
